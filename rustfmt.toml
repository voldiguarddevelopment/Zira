# Style floor for the workspace. Stable-only rustfmt options so `cargo fmt --all --check`
# runs clean on the stable channel pinned in rust-toolchain.toml.
#
# `array_width` is raised to `max_width` so an array literal that already fits the line
# width stays on one line instead of being force-wrapped at the narrow default (60). Other
# constructs keep the default heuristics, so long call/macro argument lists still wrap.
edition = "2021"
max_width = 100
array_width = 100
