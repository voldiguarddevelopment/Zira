# Zira — Ratchet harness config.
# Run:  cd ~/development/zira-build && ratchet run
# (loads the document trio, drives the test-first loop, serves the web dashboard).
# Also driven by the daemon via `/run zira-build` (registered in the daemon config).

[project]
stack = "rust"
root  = "."

# Sonnet 4.6: the tasks are small + explicitly specified, and Ratchet's gates (frozen
# tests + mutation) — not the model — decide correctness, so a cheaper/faster model
# can't slip a fake green past them. Bump a specific stubborn task back to Opus if its
# RED phase can't write mutant-killing tests on Sonnet.
[claude]
model      = "claude-opus-4-8"
extra_args = ["--dangerously-skip-permissions"]

[budget]
max_attempts_per_task = 6
max_iterations        = 600

# Web control panel: standalone `ratchet run` serves the dashboard here.
# operator + [web.allow] gate the run-control buttons (localhost-only anyway).
[web]
enabled  = true
port     = 7880
operator = true

[web.allow]
run    = true
cancel = true
verify = true

# GitHub: public repo voldiguarddevelopment/Zira. Token is env-only (CI_TOKEN), never
# here. Push-triggered CI (.github/workflows/ci.yml) is guarded: a no-op until a
# Cargo.toml lands, then build+test hard gates + fmt/clippy advisory.
[github]
repo = "voldiguarddevelopment/Zira"

# GitHub CI offload (F8). Ready but OFF: for light pure-Rust tasks, local gates are
# faster than a CI round-trip. Flip on once a task's local gates get heavy (needs the
# RATCHET_INSTALL_TOKEN repo secret + a one-time plant-validation on a real runner).
# Free GitHub-hosted runners offload deterministic Rust gates ONLY — they do not enable
# the audio/GPU/model tasks (those stay blocked-on-human, per CLAUDE.md).
[remote_gates]
enabled    = false
regression = false
remote     = "origin"
