# RED-phase bootstrap manifest.
#
# At this point the root is ONLY a [package] — just enough to host and compile the
# repo-root `tests/` so the scaffold tests can run and fail honestly. The GREEN phase
# turns this into the hybrid [package] + [workspace] root that the tests demand
# (resolver = "2", the ten members under crates/, and the per-crate bin/lib targets).
[package]
name = "zira-build"
version = "0.0.0"
edition = "2021"
publish = false
