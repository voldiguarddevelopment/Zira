<svg xmlns="http://www.w3.org/2000/svg" width="980" height="430" viewBox="0 0 980 430" font-family="'Noto Sans','DejaVu Sans',sans-serif">
 <defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0a0c14"/><stop offset="1" stop-color="#12101d"/></linearGradient>
  <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#9d7bff"/><stop offset="0.55" stop-color="#7c5cff"/><stop offset="1" stop-color="#3fc8d4"/></linearGradient>
  <linearGradient id="done" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#3fc8d4"/><stop offset="1" stop-color="#7c5cff"/></linearGradient>
